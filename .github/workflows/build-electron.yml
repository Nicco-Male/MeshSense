name: Electron App

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: windows-2025
            platform: win
            arch: x64
          - runner: macos-15
            platform: mac
            arch: arm64
    steps:
      - name: Force LF line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x

      - name: Install dbus on Ubuntu
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libdbus-1-dev

      - name: Install webbluetooth
        working-directory: api/webbluetooth
        run: |
          npm ci
          npm run build:all

      - name: Install meshtastic-js
        working-directory: api/meshtastic-js
        run: |
          npm ci
          npm run build

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Build Electron app
        working-directory: electron
        shell: bash
        run: npm run build:${{ matrix.platform }} -- --${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: electron-build-${{ matrix.platform }}-${{ matrix.arch }}
          path: electron/dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: electron-build-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
